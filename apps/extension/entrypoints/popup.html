<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=320,initial-scale=1" />
    <title>Ikan Hub</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0A0B0E; --text: #F2F4F7; --text-3: #8B92A0;
        --border: #262A33; --accent: #B8FF66;
      }
      html, body { margin: 0; background: var(--bg); color: var(--text);
        font: 13px/1.5 system-ui, -apple-system, sans-serif; }
      body { width: 320px; padding: 16px; }
      h1 { font: 600 14px/1.2 system-ui; margin: 0 0 4px; }
      p { color: var(--text-3); margin: 0 0 12px; font-size: 12px; }
      button { display: block; width: 100%; padding: 8px 12px;
        background: var(--accent); color: var(--bg); border: 0; border-radius: 6px;
        font: 600 12px system-ui; cursor: pointer; }
      .meta { margin-top: 12px; color: var(--text-3); font: 10px monospace;
        text-transform: uppercase; letter-spacing: 0.16em; }
    </style>
  </head>
  <body>
    <h1>Ikan Hub</h1>
    <p>Visit a LinkedIn profile or company page, then click below to save it to your hub.</p>
    <button id="save" type="button">Save current page</button>
    <div class="meta">v0.1 · session-scoped · india-first</div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
